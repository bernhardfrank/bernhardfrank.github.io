<script>
  /* Nav scroll */
  const navbar = document.getElementById('navbar');
  const onScroll = () => navbar.classList.toggle('scrolled', window.scrollY > 16);
  window.addEventListener('scroll', onScroll, { passive: true }); onScroll();

  /* Mobile nav */
  const toggle = document.getElementById('navToggle');
  const mobileNav = document.getElementById('mobileNav');
  toggle.addEventListener('click', () => {
    const open = mobileNav.classList.toggle('open');
    toggle.setAttribute('aria-expanded', open);
    toggle.setAttribute('aria-label', open ? 'Navigation schließen' : 'Navigation öffnen');
  });
  document.querySelectorAll('.m-item, .m-cta').forEach(el => {
    el.addEventListener('click', () => {
      mobileNav.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
      toggle.setAttribute('aria-label', 'Navigation öffnen');
    });
  });

  /* Scroll reveal */
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
  }, { threshold: 0.1, rootMargin: '0px 0px -32px 0px' });
  document.querySelectorAll('.fade-up').forEach(el => io.observe(el));

  {% if include.filter %}
  /* Tag filter */
  const filterBtns = document.querySelectorAll('.filter-btn');
  const cards = document.querySelectorAll('.post-card[data-tags]');
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tag = btn.dataset.tag;
      cards.forEach(card => {
        const tags = card.dataset.tags.split('|');
        card.style.display = (!tag || tags.includes(tag)) ? '' : 'none';
      });
    });
  });
  {% endif %}
</script>
