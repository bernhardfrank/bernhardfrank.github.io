  <text x="600" y="920" text-anchor="middle" font-size="11" fill="#8aa0b5">Note: guest VMs run Hyper-V, so enable nested virtualization per VM: Set-VMProcessor -VMName HV20xx-x -ExposeVirtualizationExtensions $true</text>
