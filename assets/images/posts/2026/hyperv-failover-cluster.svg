  <rect x="0" y="0" width="1200" height="940" fill="#f7f9fc"/>

  <text x="600" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1f3a56">R730cluster &#8211; 2-Node Hyper-V Failover Cluster</text>
  <text x="600" y="66" text-anchor="middle" font-size="14" fill="#5b6b7a">Storage Spaces Direct (S2D) &#8226; 8 nested Hyper-V VMs running Windows Server 2016 / 2019 / 2022 / 2025</text>

