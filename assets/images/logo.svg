  <g clip-path="url(#c2)" font-family="'Chakra Petch', monospace" font-size="7.8" font-weight="400" letter-spacing="1.5">
    <text x="30" y="106" fill="white" opacity="0.30">0100000101111010</text>
    <text x="30" y="116" fill="white" opacity="0.55">0111010101110010</text>
    <text x="30" y="126" fill="white" opacity="0.30">0110010100100000</text>
    <text x="30" y="136" fill="white" opacity="0.55">0100110001101111</text>
    <text x="30" y="146" fill="white" opacity="0.30">0110001101100001</text>
    <text x="30" y="156" fill="white" opacity="0.55">0110110001000001</text>
    <text x="30" y="166" fill="white" opacity="0.30">0111101001110101</text>
  </g>
  <clipPath id="c2">
    <polygon points="114,131 95,168 55,168 32,131 55,95 95,95"/>
  </clipPath>

  <!-- ═══ WABE 3 — AVD ═══ -->
  <polygon points="181,94 160,130 118,130 97,94 118,57 160,57"
