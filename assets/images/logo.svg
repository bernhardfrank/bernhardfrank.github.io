  <g clip-path="url(#c3)" font-family="'Chakra Petch', monospace" font-size="7.8" font-weight="400" letter-spacing="1.5">
    <text x="95" y="68"  fill="white" opacity="0.55">0100000101010110</text>
    <text x="95" y="78"  fill="white" opacity="0.30">0100010001000001</text>
    <text x="95" y="88"  fill="white" opacity="0.55">0101011001000100</text>
    <text x="95" y="98"  fill="white" opacity="0.30">0100000101010110</text>
    <text x="95" y="108" fill="white" opacity="0.55">0100010001000001</text>
    <text x="95" y="118" fill="white" opacity="0.30">0101011001000100</text>
    <text x="95" y="128" fill="white" opacity="0.55">0100000101010110</text>
  </g>
  <clipPath id="c3">
    <polygon points="179,94 160,130 120,130 97,94 120,57 160,57"/>
