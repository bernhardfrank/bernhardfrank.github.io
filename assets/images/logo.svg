<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Bernhard Frank Cloud Engineering Logo – Solid Variant</title>
  <desc>Logo mit drei Hexagon-Waben, solid gefüllt mit Randfarbe</desc>

  <defs>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0095ff"/>
      <stop offset="100%" stop-color="#00e5a0"/>
    </linearGradient>
  </defs>

  <!-- ═══ WABE 1 — Hyper-V ═══ -->
  <polygon points="116,57 95,93 53,93 32,57 53,20 95,20"
    fill="#0095ff" stroke="#42b8ff" stroke-width="1.5"/>
  <g clip-path="url(#c1)" font-family="'Chakra Petch', monospace" font-size="7.8" font-weight="400" letter-spacing="1.5">
    <text x="30" y="30"  fill="white" opacity="0.55">0100100001111001</text>
    <text x="30" y="40"  fill="white" opacity="0.30">0111000001100101</text>
    <text x="30" y="50"  fill="white" opacity="0.55">0111001000101101</text>
    <text x="30" y="60"  fill="white" opacity="0.30">0101011001001000</text>
    <text x="30" y="70"  fill="white" opacity="0.55">0111100101110000</text>
    <text x="30" y="80"  fill="white" opacity="0.30">0110010101110010</text>
    <text x="30" y="90"  fill="white" opacity="0.55">0010110101010110</text>
  </g>
  <clipPath id="c1">
    <polygon points="114,57 95,93 55,93 32,57 55,20 95,20"/>
  </clipPath>

  <!-- ═══ WABE 2 — Azure Local ═══ -->
  <polygon points="116,131 95,168 53,168 32,131 53,95 95,95"
