  <!-- ═══ WORDMARK ═══ -->
  <text x="210" y="100"
    font-family="'Chakra Petch', monospace" font-weight="700" font-size="52"
    fill="url(#text-grad)" letter-spacing="-1">Bernhard</text>

  <text x="210" y="155"
    font-family="'Chakra Petch', monospace" font-weight="700" font-size="52"
    fill="#0d1b2a" letter-spacing="-1">Frank</text>

  <line x1="210" y1="168" x2="500" y2="168" stroke="#0095ff" stroke-width="1" opacity="0.4"/>

  <text x="212" y="193"
    font-family="'Chakra Petch', monospace" font-weight="300" font-size="26"
    fill="#90b8d8" letter-spacing="5">Cloud Engineering</text>

</svg>
